<!doctype html><html lang=pt-BR><head><meta charset=utf-8><meta name=viewport content="width=device-width, initial-scale=1, viewport-fit=cover"><title>dichava.app</title><meta name="theme-color" content="#1B2A1C">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Playfair+Display:wght@700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--acc:#ffffff;--accTx:#1E7A44;--rad:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.5;min-height:100vh;color:#fff;background:#1B2A1C}
body.f-serif{font-family:'Playfair Display',Georgia,serif}
body.f-round{font-family:'Nunito','Poppins',system-ui,sans-serif}
body.f-poppins{font-family:'Poppins',system-ui,sans-serif}
.bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
.bg::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 60% at 50% 0%,rgba(255,255,255,.1),transparent 60%)}
.wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:38px 22px 46px;text-align:center;min-height:100vh;display:flex;flex-direction:column}
.avw{position:relative;width:104px;margin:0 auto 14px}
.av{width:104px;height:104px;border-radius:50%;background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.7);display:grid;place-items:center;font-size:38px;font-weight:800;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.av img{width:100%;height:100%;object-fit:cover}
.seal{position:absolute;right:2px;bottom:2px;width:32px;height:32px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.nome{font-size:25px;font-weight:800;letter-spacing:-.3px}
.tipo{font-size:15px;opacity:.9;font-weight:600;margin-top:2px}
.reg{font-size:12.5px;opacity:.75;margin-top:2px}
.rate{display:inline-flex;align-items:center;gap:6px;margin-top:11px;background:rgba(0,0,0,.2);border-radius:20px;padding:5px 14px;font-size:13.5px;font-weight:700}
.bio{font-size:14px;opacity:.92;margin:16px auto 4px;max-width:340px;line-height:1.55}
.links{margin-top:24px;display:flex;flex-direction:column;gap:12px}
.lk{display:flex;align-items:center;gap:13px;border-radius:var(--rad);padding:15px 18px;text-decoration:none;font-weight:700;font-size:15.5px;transition:transform .12s,filter .12s;cursor:pointer}
.lk:hover{transform:translateY(-1px)}
.lk .li{width:26px;text-align:center;font-size:20px;flex:none}
.lk .lt{flex:1;text-align:left}
.lk .lg{opacity:.55;font-size:18px}
/* estilos de botão */
.st-suave .lk{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(6px);color:#fff}
.st-suave .lk:hover{background:rgba(255,255,255,.22)}
.st-suave .lk.primary{background:var(--acc);color:var(--accTx);border-color:var(--acc);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.st-preench .lk{background:var(--acc);color:var(--accTx);border:1px solid transparent}
.st-preench .lk:hover{filter:brightness(.96)}
.st-contorno .lk{background:rgba(0,0,0,.12);border:1.6px solid rgba(255,255,255,.55);color:#fff}
.st-contorno .lk.primary{background:var(--acc);color:var(--accTx);border-color:var(--acc)}
.foot{margin-top:auto;padding-top:34px}
.brand{font-size:13px;font-weight:800;opacity:.8;text-decoration:none;color:#fff}.brand span{opacity:.6}
.foot-s{font-size:11px;opacity:.5;margin-top:4px}
.spin{width:24px;height:24px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;margin:80px auto;display:block}@keyframes sp{to{transform:rotate(360deg)}}
</style></head><body>
<div class="bg" id="bg"></div>
<div class="wrap st-suave" id="wrap"><span class="spin"></span></div>
<script>
const SB=(typeof supabase!=='undefined')?supabase.createClient('https://gnpwaywyexcevtzbwiyq.supabase.co','sb_publishable_JBxiSIYDYRBxgBunmedHfA_BJDCffZ4'):null;
const params=new URLSearchParams(location.search);
const CODIGO=(params.get('c')||'').toUpperCase();
const PREVIEW=params.get('preview')==='1';
const CAPAS={verde:'linear-gradient(150deg,#1B3A2A 0%,#2FA35F 62%,#3FA76A 100%)',oceano:'linear-gradient(150deg,#0B2E4A 0%,#1E7FB0 60%,#37C0C9 100%)',roxo:'linear-gradient(150deg,#2E1B48 0%,#6B4BCE 62%,#9B5DE5 100%)',porsol:'linear-gradient(150deg,#5A1E3A 0%,#E0642F 58%,#F5A623 100%)',rosa:'linear-gradient(150deg,#4A1436 0%,#C93E77 60%,#F473A6 100%)',grafite:'linear-gradient(150deg,#15181C 0%,#3A424C 60%,#5B6672 100%)',petroleo:'linear-gradient(150deg,#08201E 0%,#0E6B63 60%,#1BA89B 100%)',vinho:'linear-gradient(150deg,#2B0B12 0%,#7A1F3D 60%,#C0395F 100%)',floresta:'linear-gradient(150deg,#12240F 0%,#2E5B1E 55%,#6FA53C 100%)',meianoite:'linear-gradient(160deg,#0B1026 0%,#243B7A 60%,#4F73C4 100%)'};
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ini=n=>String(n||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase();
const SEAL='<svg width="27" height="27" viewBox="0 0 24 24"><defs><linearGradient id="s" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4CD98A"/><stop offset="1" stop-color="#1E9E8A"/></linearGradient></defs><g fill="url(#s)"><rect x="5.6" y="5.6" width="12.8" height="12.8" rx="4"/><rect x="5.6" y="5.6" width="12.8" height="12.8" rx="4" transform="rotate(45 12 12)"/></g><path d="M8.5 12.2l2.3 2.3 4.7-5" stroke="#fff" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function proLink(v){v=(v||'').trim();if(!v)return null;if(v[0]==='@')return{href:'https://instagram.com/'+v.slice(1).replace(/[^\w.]/g,''),label:v};if(/instagram\.com/i.test(v)){const h=(v.split('instagram.com/')[1]||'').replace(/[/?#].*$/,'');return{href:'https://instagram.com/'+h,label:'@'+h};}let href=v;if(!/^https?:\/\//i.test(href))href='https://'+href;return{href,label:v.replace(/^https?:\/\//i,'').replace(/\/$/,'')};}
// contraste: texto escuro ou claro sobre a cor de destaque
function txtSobre(hex){try{const c=hex.replace('#','');const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);return (0.299*r+0.587*g+0.114*b)>150?'#1B2A1C':'#fff';}catch(e){return '#1B2A1C';}}

function aplicarConfig(cfg){
  cfg=cfg||{};
  // fundo
  const f=cfg.fundo||{tipo:'preset',v:'verde'};
  let bg=CAPAS.verde;
  if(f.tipo==='preset')bg=CAPAS[f.v]||CAPAS.verde;
  else if(f.tipo==='solid')bg=f.cor||'#1B3A2A';
  else if(f.tipo==='grad')bg=`linear-gradient(150deg,${f.c1||'#1B3A2A'},${f.c2||'#2FA35F'})`;
  document.getElementById('bg').style.background=bg;
  document.getElementById('bg').style.backgroundSize='cover';
  // fonte
  document.body.className=({serif:'f-serif',round:'f-round',poppins:'f-poppins'})[cfg.fonte]||'';
  // cor de destaque
  const acc=(cfg.botao&&cfg.botao.cor)||'#ffffff';
  document.documentElement.style.setProperty('--acc',acc);
  document.documentElement.style.setProperty('--accTx',txtSobre(acc));
  document.documentElement.style.setProperty('--rad',((cfg.botao&&cfg.botao.raio)||16)+'px');
  // estilo dos botões
  const est=({suave:'st-suave',preench:'st-preench',contorno:'st-contorno'})[(cfg.botao&&cfg.botao.estilo)]||'st-suave';
  const w=document.getElementById('wrap');w.classList.remove('st-suave','st-preench','st-contorno');w.classList.add(est);
}

function render(p,cfg,avg,n){
  cfg=cfg||{}; aplicarConfig(cfg);
  const temAgenda=p.agenda_config&&p.agenda_config.dias&&Object.keys(p.agenda_config.dias).length;
  const lk=proLink(p.link);
  const tel=(p.telefone||'').replace(/[^0-9]/g,'');const wa=tel.length>=10?('55'+tel):'';
  const links=Array.isArray(p.bio_links)?p.bio_links:[];
  const titulo=(cfg.titulo||'').trim()||p.nome;
  const subt=(cfg.subtitulo!=null&&cfg.subtitulo!=='')?cfg.subtitulo:(p.tipo_prof||'');
  let html=`
    <div class="avw"><div class="av">${p.foto?`<img src="${p.foto}" alt="">`:ini(p.nome)}</div>${cfg.selo!==false?`<div class="seal">${SEAL}</div>`:''}</div>
    <div class="nome">${esc(titulo)}</div>
    ${subt?`<div class="tipo">${esc(subt)}</div>`:''}
    ${p.reg&&cfg.mostrarReg!==false?`<div class="reg">${esc(p.reg)}</div>`:''}
    ${n&&cfg.mostrarNota!==false?`<div class="rate">⭐ ${avg.toFixed(1)} · ${n} avaliaç${n===1?'ão':'ões'}</div>`:''}
    ${p.bio&&cfg.mostrarBio!==false?`<div class="bio">${esc(cfg.bioTexto||p.bio)}</div>`:''}
    <div class="links">`;
  html+=`<a class="lk primary" href="${PREVIEW?'javascript:void 0':'/agendar/?c='+encodeURIComponent(CODIGO)}"><span class="li">📅</span><span class="lt">${esc(cfg.txtAgendar||'Agendar consulta')}</span><span class="lg">›</span></a>`;
  if(wa) html+=`<a class="lk" href="${PREVIEW?'javascript:void 0':'https://wa.me/'+wa}" target="_blank" rel="noopener"><span class="li">💬</span><span class="lt">WhatsApp</span><span class="lg">↗</span></a>`;
  if(lk) html+=`<a class="lk" href="${PREVIEW?'javascript:void 0':esc(lk.href)}" target="_blank" rel="noopener"><span class="li">${/instagram/.test(lk.href)?'📸':'🌐'}</span><span class="lt">${esc(lk.label)}</span><span class="lg">↗</span></a>`;
  links.forEach(l=>{ if(l&&l.url){ const u=proLink(l.url); html+=`<a class="lk" href="${PREVIEW?'javascript:void 0':esc((u&&u.href)||l.url)}" target="_blank" rel="noopener"><span class="li">${esc(l.icone||'🔗')}</span><span class="lt">${esc(l.titulo||l.url)}</span><span class="lg">↗</span></a>`; } });
  html+=`</div><div class="foot"><a class="brand" href="${PREVIEW?'javascript:void 0':'https://dichava.app'}">dichava<span>.app</span></a><div class="foot-s">Rede de profissionais de redução de danos</div></div>`;
  document.getElementById('wrap').innerHTML=html;
}
function fail(){document.getElementById('bg').style.background=CAPAS.verde;document.getElementById('wrap').innerHTML='<div style="margin:auto"><div style="font-size:44px">🔗</div><h1 style="margin-top:10px;font-size:20px">Link indisponível</h1><p style="opacity:.85;margin-top:8px;font-size:14px">Confira o link ou volte mais tarde.</p></div><div class="foot"><a class="brand" href="https://dichava.app">dichava<span>.app</span></a></div>';}

if(PREVIEW){
  // preview ao vivo: recebe {prof, config, avg, n} do editor via postMessage
  window.addEventListener('message',e=>{const d=e.data;if(d&&d.type==='bio-preview'){try{render(d.prof||{nome:'Seu nome'},d.config||{},d.avg||0,d.n||0);}catch(err){}}});
  try{parent.postMessage({type:'bio-preview-ready'},'*');}catch(e){}
  render({nome:'Seu nome',tipo_prof:'Sua especialidade'},{},0,0);
}else{
  (async function(){
    if(!CODIGO||!SB){fail();return;}
    try{
      const{data:profs}=await SB.from('profissionais').select('id,nome,tipo_prof,reg,bio,foto,link,telefone,capa,agenda_config,bio_links,bio_config').eq('agenda_codigo',CODIGO).eq('status','aprovado');
      const p=(profs&&profs[0]); if(!p){fail();return;}
      let avg=0,n=0; try{const{data:av}=await SB.from('avaliacoes_prof').select('nota').eq('prof_id',p.id);if(av&&av.length){n=av.length;avg=av.reduce((s,a)=>s+a.nota,0)/n;}}catch(e){}
      let cfg=p.bio_config||{}; if(!cfg.fundo&&p.capa)cfg.fundo={tipo:'preset',v:p.capa};
      render(p,cfg,avg,n);
    }catch(e){fail();}
  })();
}
</script>
</body></html>
