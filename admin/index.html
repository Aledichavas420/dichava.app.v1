<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>dichava.app — Admin</title>
<style>
:root{--bg:#0e1512;--card:#16211c;--card2:#1b2822;--line:#25332c;--tx:#eaf3ee;--txm:#9db0a6;--txs:#7d918a;--v:#2FA35F;--ve:#41c47a;--vf:#14261c;--a:#F5A623;--er:#E5484D;--roxo:#8B6FE0;--azul:#4C8DF6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--ve)}
.hide{display:none!important}
/* LOGIN */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px 26px;text-align:center}
.gate-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#3ecf8e,#1f9d63);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:#fff;margin:0 auto 14px}
.gate-card h2{font-size:22px;margin-bottom:4px}
.gsub{color:var(--txm);font-size:13.5px;margin-bottom:20px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--txm);margin-bottom:6px}
.field input,.field select{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#0b1310;color:var(--tx);font-size:15px;font-family:inherit}
.field input:focus{outline:none;border-color:var(--v)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:13px;background:var(--v);color:#fff;font-weight:800;font-size:15px;padding:13px 18px;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.55}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--tx)}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn.wv{background:var(--vf);color:var(--ve);border:1px solid #1f4030}
.btn.wa{background:#1f2e26;color:#5adca0;border:1px solid #26463620}
.btn.dg{background:transparent;border:1.5px solid #4a2626;color:#ff8b8b}
.gate-err{color:#ff8b8b;font-size:13px;min-height:16px;margin-bottom:8px}
/* SHELL */
.top{position:sticky;top:0;z-index:10;background:rgba(14,21,18,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:12px}
.top .lg{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3ecf8e,#1f9d63);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.top h1{font-size:16px;flex:1}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
.sec{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--txs);margin:26px 4px 12px}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.kpi .kl{font-size:12px;color:var(--txm);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .kv{font-size:30px;font-weight:800;margin-top:6px;line-height:1}
.kpi .kd{font-size:11.5px;color:var(--txs);margin-top:5px}
.kpi.hl{background:linear-gradient(150deg,#16281d,#14211b);border-color:#22402f}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
/* PROF CARD */
.plist{display:flex;flex-direction:column;gap:12px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.pcard.pend{border-color:#4a3d1e}
.phead{display:flex;align-items:flex-start;gap:12px}
.pav{width:46px;height:46px;border-radius:50%;background:#22332b;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:var(--ve);flex-shrink:0}
.pn{font-size:16px;font-weight:800}
.pmeta{font-size:12.5px;color:var(--txm);margin-top:2px;word-break:break-word}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#22332b;color:var(--txm)}
.chip.v{background:#12301f;color:#5adca0}
.chip.a{background:#33290f;color:#f0b950}
.chip.e{background:#3a1e1e;color:#ff9a9a}
.chip.b{background:#1a2a3a;color:#7fb8ff}
.pacts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.obs{font-size:12px;color:var(--txs);margin-top:10px;background:#0b1310;border-radius:9px;padding:8px 10px;border:1px solid var(--line)}
.empty{text-align:center;color:var(--txm);padding:40px 10px;font-size:14px}
.chartcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px 12px}
.bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:8px}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar .col{width:100%;max-width:44px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,#41c47a,#2FA35F);min-height:3px;transition:height .4s}
.bar .bn{font-size:12px;font-weight:800;color:var(--tx)}
.bar .bl{font-size:10.5px;color:var(--txs)}
.spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--v);border-radius:50%;animation:sp 1s linear infinite;margin:50px auto;display:block}@keyframes sp{to{transform:rotate(360deg)}}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ft{font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);color:var(--txm);cursor:pointer}
.ft.on{background:var(--vf);color:var(--ve);border-color:#1f4030}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;width:100%;max-width:400px}
.modal h3{font-size:18px;margin-bottom:14px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(60px);background:#0b1310;border:1px solid var(--line);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:100;max-width:90vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:#4a2626}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">d</div>
    <h2>Painel Admin</h2>
    <div class="gsub">Acesso restrito — dichava.app</div>
    <div class="gate-err" id="gerr"></div>
    <div class="field"><label>E-mail</label><input id="g-email" type="email" autocomplete="email" placeholder="voce@email.com"></div>
    <div class="field"><label>Senha</label><input id="g-pw" type="password" autocomplete="current-password" placeholder="Sua senha"></div>
    <button class="btn" id="g-btn" style="width:100%" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- 2FA -->
<div id="mfa" class="hide">
  <div class="gate-card">
    <div class="gate-logo">🔐</div>
    <h2 id="mfa-title">Verificação em 2 etapas</h2>
    <div class="gsub" id="mfa-sub">Digite o código do seu app autenticador.</div>
    <div id="mfa-enroll-box" class="hide" style="margin-bottom:14px">
      <div style="background:#fff;border-radius:14px;padding:12px;display:inline-block"><img id="mfa-qr" alt="QR" style="width:190px;height:190px;display:block"></div>
      <div style="font-size:12.5px;color:var(--txm);margin-top:10px;line-height:1.5">Escaneie com <b>Google Authenticator</b>, <b>Authy</b> ou similar.<br>Ou use a chave: <code id="mfa-secret" style="color:var(--ve);word-break:break-all"></code></div>
    </div>
    <div class="gate-err" id="mfa-err"></div>
    <div class="field"><label>Código de 6 dígitos</label><input id="mfa-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" style="text-align:center;letter-spacing:6px;font-size:20px"></div>
    <button class="btn" id="mfa-btn" style="width:100%" onclick="verificarMfa()">Verificar</button>
    <button class="btn ghost sm" style="width:100%;margin-top:10px" onclick="sair()">Cancelar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="top">
    <div class="lg">d</div><h1>Painel Admin</h1>
    <button class="btn ghost sm" onclick="carregar()">↻ Atualizar</button>
    <button class="btn ghost sm" onclick="sair()">Sair</button>
  </div>
  <div class="wrap">
    <div class="sec">Visão geral</div>
    <div class="kpis" id="kpis"><div class="spin"></div></div>

    <div class="sec">Crescimento de usuários</div>
    <div class="card chartcard" id="growth"><div class="spin"></div></div>

    <div class="sec">Suporte — conversas</div>
    <div class="plist" id="suplist"><div class="empty" style="padding:20px">—</div></div>

    <div class="sec">Profissionais</div>
    <div class="filters" id="filters"></div>
    <div class="plist" id="plist"><div class="spin"></div></div>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const $=s=>document.querySelector(s);
const SB = (typeof supabase!=='undefined') ? supabase.createClient('https://gnpwaywyexcevtzbwiyq.supabase.co','sb_publishable_JBxiSIYDYRBxgBunmedHfA_BJDCffZ4') : null;
const ADMIN_EMAILS=['alex.mnteir@gmail.com'];
// Planos — valores da landing de profissionais (mantenha igual ao painel da clínica)
const PLANOS=[
  {k:'essencial',   nome:'Essencial',   preco:'R$ 79,90/mês',  anual:'R$ 799/ano'},
  {k:'profissional',nome:'Profissional',preco:'R$ 179,90/mês', anual:'R$ 1.799/ano'},
  {k:'clinica',     nome:'Clínica',     preco:'R$ 299,90/mês', anual:'R$ 2.999/ano'},
];
function planoNome(k){ const p=PLANOS.find(x=>x.k===k); return p?p.nome:(k||''); }
function planoPreco(k){ const p=PLANOS.find(x=>x.k===k); return p?p.preco:''; }
let PROFS=[], _filtro='todos';
let _tT; function toast(m,err){const t=$('#toast');t.textContent=m;t.classList.toggle('err',!!err);t.classList.add('on');clearTimeout(_tT);_tT=setTimeout(()=>t.classList.remove('on'),2600);}
function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function initials(n){return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function gerr(m){$('#gerr').textContent=m||'';}
function fmtData(d){ if(!d)return '—'; const x=new Date(d); return x.toLocaleDateString('pt-BR'); }

async function boot(){
  if(!SB){ gerr('Sem conexão com o servidor.'); return; }
  const {data}=await SB.auth.getSession();
  const u=data&&data.session&&data.session.user;
  if(u && ADMIN_EMAILS.includes((u.email||'').toLowerCase())) await rotearMfa();
}
async function entrar(){
  gerr('');
  const email=$('#g-email').value.trim(), pw=$('#g-pw').value;
  if(!email||!pw){ gerr('Preencha e-mail e senha.'); return; }
  if(!ADMIN_EMAILS.includes(email.toLowerCase())){ gerr('Esta conta não tem acesso admin.'); return; }
  const b=$('#g-btn'); b.disabled=true; b.textContent='Entrando…';
  try{
    const {data,error}=await SB.auth.signInWithPassword({email,password:pw});
    if(error){ gerr(/Invalid/.test(error.message)?'E-mail ou senha incorretos.':error.message); return; }
    if(!ADMIN_EMAILS.includes((data.user.email||'').toLowerCase())){ gerr('Sem acesso admin.'); await SB.auth.signOut(); return; }
    await rotearMfa();
  }catch(e){ gerr('Não consegui entrar agora.'); }
  finally{ b.disabled=false; b.textContent='Entrar'; }
}
async function sair(){ try{await SB.auth.signOut();}catch(e){} location.reload(); }
function abrirApp(){ $('#gate').classList.add('hide'); $('#mfa').classList.add('hide'); $('#app').classList.remove('hide'); carregar(); }

/* ===== 2FA (TOTP) ===== */
let _mfaFactorId=null, _mfaChallengeId=null;
function mfaErr(m){ $('#mfa-err').textContent=m||''; }
async function rotearMfa(){
  try{
    const {data:aal,error}=await SB.auth.mfa.getAuthenticatorAssuranceLevel();
    if(error) throw error;
    if(aal.currentLevel==='aal2'){ abrirApp(); return; }
    if(aal.nextLevel==='aal2'){ await mostrarChallenge(); return; }   // já tem 2FA, precisa do código
    await mostrarEnroll();                                            // ainda sem 2FA → configurar agora
  }catch(e){
    // Se o projeto não tiver MFA habilitado, o método pode falhar → entra direto (não trava)
    if(/mfa|not enabled|unsupported/i.test(e.message||'')) abrirApp(); else { gerr('Erro no 2FA: '+(e.message||'')); }
  }
}
function mostrarGateMfa(){ $('#gate').classList.add('hide'); $('#mfa').classList.remove('hide'); setTimeout(()=>$('#mfa-code').focus(),100); }
async function mostrarChallenge(){
  mfaErr('');
  $('#mfa-enroll-box').classList.add('hide');
  $('#mfa-title').textContent='Verificação em 2 etapas';
  $('#mfa-sub').textContent='Digite o código do seu app autenticador.';
  const {data:fs}=await SB.auth.mfa.listFactors();
  const totp=(fs&&fs.totp&&fs.totp[0])||null;
  if(!totp){ await mostrarEnroll(); return; }
  _mfaFactorId=totp.id;
  const {data:ch,error}=await SB.auth.mfa.challenge({factorId:_mfaFactorId});
  if(error){ mfaErr(error.message); return; }
  _mfaChallengeId=ch.id;
  mostrarGateMfa();
}
async function mostrarEnroll(){
  mfaErr('');
  $('#mfa-title').textContent='Ative a verificação em 2 etapas';
  $('#mfa-sub').textContent='Pra proteger o painel, configure um app autenticador.';
  $('#mfa-enroll-box').classList.remove('hide');
  const {data,error}=await SB.auth.mfa.enroll({factorType:'totp',friendlyName:'admin-'+Date.now()});
  if(error){ mfaErr(error.message); mostrarGateMfa(); return; }
  _mfaFactorId=data.id;
  $('#mfa-qr').src=data.totp.qr_code;
  $('#mfa-secret').textContent=data.totp.secret;
  const {data:ch}=await SB.auth.mfa.challenge({factorId:_mfaFactorId});
  _mfaChallengeId=ch&&ch.id;
  mostrarGateMfa();
}
async function verificarMfa(){
  mfaErr('');
  const code=($('#mfa-code').value||'').trim();
  if(code.length<6){ mfaErr('Digite os 6 dígitos.'); return; }
  const b=$('#mfa-btn'); b.disabled=true; b.textContent='Verificando…';
  try{
    if(!_mfaChallengeId){ const {data:ch}=await SB.auth.mfa.challenge({factorId:_mfaFactorId}); _mfaChallengeId=ch.id; }
    const {error}=await SB.auth.mfa.verify({factorId:_mfaFactorId,challengeId:_mfaChallengeId,code});
    if(error){ mfaErr('Código incorreto. Tente de novo.'); _mfaChallengeId=null; return; }
    abrirApp();
  }catch(e){ mfaErr('Não consegui verificar agora.'); }
  finally{ b.disabled=false; b.textContent='Verificar'; }
}

async function carregar(){
  renderFiltros();
  // stats
  try{
    const {data,error}=await SB.rpc('admin_stats');
    if(error) throw error;
    renderKpis(data); renderGrowth(data.usuarios_por_mes||[]);
  }catch(e){ $('#kpis').innerHTML='<div class="empty">Não consegui carregar as estatísticas.<br><small style="color:var(--txs)">'+esc(e.message||'')+'</small><br><small style="color:var(--txs)">Rodou o admin-setup.sql?</small></div>'; $('#growth').innerHTML=''; }
  // profissionais
  try{
    const {data,error}=await SB.rpc('admin_profissionais');
    if(error) throw error;
    PROFS=data||[]; renderProfs();
  }catch(e){ $('#plist').innerHTML='<div class="empty">Não consegui carregar os profissionais.<br><small style="color:var(--txs)">'+esc(e.message||'')+'</small></div>'; }
  carregarSuporte();
}

/* ===== SUPORTE (admin) ===== */
async function carregarSuporte(){
  try{
    const {data,error}=await SB.rpc('admin_suporte_conversas');
    if(error) throw error;
    const cs=data||[];
    if(!cs.length){ $('#suplist').innerHTML='<div class="empty" style="padding:20px">Nenhuma conversa de suporte ainda.</div>'; return; }
    $('#suplist').innerHTML=cs.map(c=>{const prio=c.plano==='clinica'||c.plano==='profissional';return `<div class="pcard" style="cursor:pointer${prio?';border-color:#4a3d1e':''}" onclick="abrirSuporte('${c.prof_id}','${esc((c.nome||'Profissional').replace(/'/g,''))}')">
      <div class="phead"><div class="pav">${initials(c.nome)}</div>
      <div style="flex:1;min-width:0"><div class="pn">${esc(c.nome||'Profissional')} ${prio?`<span class="chip a">⭐ ${esc(planoNome(c.plano))}</span>`:''} ${c.nao_lidas?`<span class="chip a">${c.nao_lidas} nova(s)</span>`:''}</div>
      <div class="pmeta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.ultima_msg||'')}</div></div></div>
    </div>`;}).join('');
  }catch(e){ $('#suplist').innerHTML='<div class="empty" style="padding:20px">Suporte indisponível.<br><small style="color:var(--txs)">'+esc(e.message||'')+' — rodou o suporte-setup.sql?</small></div>'; }
}
let _supProf=null, _supPoll=null;
async function abrirSuporte(profId,nome){
  _supProf=profId;
  $('#modalRoot').innerHTML=`<div class="mbg" onclick="if(event.target===this)fecharSuporte()"><div class="modal" style="max-width:440px">
    <h3>Suporte — ${esc(nome)}</h3>
    <div id="sup-scroll" style="height:52vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;background:#0b1310;border-radius:12px;padding:12px;margin-bottom:10px"></div>
    <div style="display:flex;gap:8px"><textarea id="sup-input" rows="1" placeholder="Responder…" style="flex:1;resize:none;max-height:90px;border:1.5px solid var(--line);border-radius:11px;padding:10px;background:#0b1310;color:var(--tx);font-family:inherit" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarSuporte();}"></textarea><button class="btn" onclick="enviarSuporte()">Enviar</button></div>
    <button class="btn ghost sm" style="width:100%;margin-top:8px" onclick="fecharSuporte()">Fechar</button>
  </div></div>`;
  await carregarSupMsgs(true); await marcarSupLidas();
  clearInterval(_supPoll); _supPoll=setInterval(()=>carregarSupMsgs(false),4000);
}
function fecharSuporte(){ clearInterval(_supPoll); _supProf=null; fecharModal(); carregarSuporte(); }
async function carregarSupMsgs(scroll){
  if(!_supProf)return;
  try{
    const {data}=await SB.from('suporte_mensagens').select('*').eq('prof_id',_supProf).order('criado_em',{ascending:true});
    const sc=$('#sup-scroll'); if(!sc)return;
    sc.innerHTML=(data||[]).map(m=>{const mine=m.remetente==='suporte';const h=new Date(m.criado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});return `<div style="max-width:80%;padding:9px 12px;border-radius:14px;font-size:14px;line-height:1.4;${mine?'align-self:flex-end;background:var(--v);color:#fff;border-bottom-right-radius:4px':'align-self:flex-start;background:#1b2822;border-bottom-left-radius:4px'}">${esc(m.texto)}<div style="font-size:10px;opacity:.6;text-align:right;margin-top:3px">${h}</div></div>`;}).join('')||'<div style="margin:auto;color:var(--txm);font-size:13px">Sem mensagens.</div>';
    if(scroll) sc.scrollTop=sc.scrollHeight;
  }catch(e){}
}
async function enviarSuporte(){
  const inp=$('#sup-input'); const t=(inp.value||'').trim(); if(!t||!_supProf)return;
  inp.value='';
  try{ await SB.from('suporte_mensagens').insert({prof_id:_supProf,remetente:'suporte',texto:t,lida_admin:true}); await carregarSupMsgs(true); }
  catch(e){ toast('Erro ao enviar: '+(e.message||''),1); inp.value=t; }
}
async function marcarSupLidas(){ try{ await SB.from('suporte_mensagens').update({lida_admin:true}).eq('prof_id',_supProf).eq('remetente','prof'); }catch(e){} }

function renderKpis(s){
  s=s||{};
  const cards=[
    {l:'Usuários no app',v:s.usuarios_total??'—',d:(s.usuarios_novos_30d??0)+' novos em 30d',dot:'#4C8DF6',hl:true},
    {l:'Ativos (7 dias)',v:s.usuarios_7d??'—',d:'entraram esta semana',dot:'#41c47a'},
    {l:'Profissionais ativos',v:s.prof_ativos??'—',d:(s.prof_total??0)+' no total',dot:'#2FA35F',hl:true},
    {l:'Aguardando liberação',v:s.prof_pendentes??'—',d:'na sua fila',dot:'#F5A623'},
    {l:'Assinaturas expiradas',v:s.prof_expirados??'—',d:'precisam renovar',dot:'#E5484D'},
    {l:'Agendamentos solicitados',v:s.agend_total??'—',d:(s.agend_30d??0)+' em 30d · '+(s.agend_novas??0)+' novos',dot:'#41c47a',hl:true},
    {l:'Avaliações',v:s.avaliacoes_total??'—',d:'média '+(s.avaliacoes_media??'—')+' ★',dot:'#8B6FE0'},
  ];
  $('#kpis').innerHTML=cards.map(c=>`<div class="kpi ${c.hl?'hl':''}">
    <div class="kl"><span class="dot" style="background:${c.dot}"></span>${c.l}</div>
    <div class="kv">${c.v}</div><div class="kd">${c.d}</div></div>`).join('');
}

function renderGrowth(rows){
  const box=$('#growth'); if(!box)return;
  if(!rows||!rows.length){ box.innerHTML='<div class="empty" style="padding:20px">Sem dados de crescimento ainda.</div>'; return; }
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const max=Math.max(1,...rows.map(r=>r.n||0));
  box.innerHTML='<div class="bars">'+rows.map(r=>{
    const mi=parseInt((r.mes||'').split('-')[1],10)-1;
    const h=Math.round(((r.n||0)/max)*100);
    return `<div class="bar"><div class="bn">${r.n||0}</div><div class="col" style="height:${h}%"></div><div class="bl">${meses[mi]||''}</div></div>`;
  }).join('')+'</div>';
}
function renderFiltros(){
  const fs=[['todos','Todos'],['pendente','Pendentes'],['ativo','Ativos'],['expirado','Expirados'],['rejeitado','Rejeitados']];
  $('#filters').innerHTML=fs.map(([k,l])=>`<button class="ft ${_filtro===k?'on':''}" onclick="setFiltro('${k}')">${l}</button>`).join('');
}
function setFiltro(f){ _filtro=f; renderFiltros(); renderProfs(); }

function statusInfo(p){
  const now=Date.now();
  const expirado = p.ativo && p.acesso_ate && new Date(p.acesso_ate).getTime()<=now;
  const ativo = p.ativo && !expirado;
  return {ativo,expirado};
}
function renderProfs(){
  let list=PROFS.slice();
  list=list.filter(p=>{
    const {ativo,expirado}=statusInfo(p);
    if(_filtro==='todos')return true;
    if(_filtro==='pendente')return (p.status||'pendente')==='pendente' && !ativo;
    if(_filtro==='ativo')return ativo;
    if(_filtro==='expirado')return expirado;
    if(_filtro==='rejeitado')return p.status==='rejeitado';
    return true;
  });
  if(!list.length){ $('#plist').innerHTML='<div class="empty">Nenhum profissional aqui.</div>'; return; }
  $('#plist').innerHTML=list.map(p=>{
    const {ativo,expirado}=statusInfo(p);
    const chips=[];
    if(ativo)chips.push('<span class="chip v">● Ativo</span>');
    else if(expirado)chips.push('<span class="chip e">Expirado</span>');
    else chips.push('<span class="chip a">Aguardando liberação</span>');
    if(p.status==='aprovado')chips.push('<span class="chip v">Perfil aprovado</span>');
    else if(p.status==='rejeitado')chips.push('<span class="chip e">Rejeitado</span>');
    else chips.push('<span class="chip a">Perfil pendente</span>');
    if(p.plano)chips.push('<span class="chip b">'+esc(planoNome(p.plano))+(planoPreco(p.plano)?' · '+esc(planoPreco(p.plano)):'')+'</span>');
    if(p.acesso_ate)chips.push('<span class="chip b">até '+fmtData(p.acesso_ate)+'</span>');
    if(p.tem_comprovante)chips.push('<span class="chip v">📎 comprovante</span>');
    if(p.n_aval)chips.push('<span class="chip">'+(p.media_aval||'—')+' ★ ('+p.n_aval+')</span>');
    const acts=[];
    if(!ativo)acts.push(`<button class="btn wv sm" onclick="abrirLiberar('${p.id}')">✓ Liberar acesso</button>`);
    else acts.push(`<button class="btn ghost sm" onclick="abrirLiberar('${p.id}')">Renovar / editar</button>`);
    if((p.status||'pendente')!=='aprovado')acts.push(`<button class="btn ghost sm" onclick="acao('${p.id}','aprovar')">Aprovar perfil</button>`);
    if(ativo)acts.push(`<button class="btn dg sm" onclick="acao('${p.id}','bloquear')">Bloquear</button>`);
    if(p.status!=='rejeitado')acts.push(`<button class="btn dg sm" onclick="acao('${p.id}','rejeitar')">Rejeitar</button>`);
    if(p.tem_comprovante)acts.push(`<button class="btn ghost sm" onclick="verComprovante('${p.id}')">📎 Ver comprovante</button>`);
    const wa = p.telefone?('<a class="btn wa sm" href="https://wa.me/55'+String(p.telefone).replace(/\D/g,'')+'" target="_blank" rel="noopener">WhatsApp</a>'):'';
    return `<div class="pcard ${!ativo&&!expirado?'pend':''}">
      <div class="phead">
        <div class="pav">${initials(p.nome)}</div>
        <div style="flex:1;min-width:0">
          <div class="pn">${esc(p.nome||'Sem nome')}</div>
          <div class="pmeta">${esc(p.tipo_prof||'Profissional')}${p.reg?' · '+esc(p.reg):''}${p.cidade?' · '+esc(p.cidade):''}</div>
          <div class="pmeta">${esc(p.email||'')}${p.telefone?' · '+esc(p.telefone):''}</div>
          <div class="chips">${chips.join('')}</div>
        </div>
      </div>
      ${p.obs_admin?`<div class="obs">📝 ${esc(p.obs_admin)}</div>`:''}
      <div class="pacts">${acts.join('')}${wa}</div>
    </div>`;
  }).join('');
}

function abrirLiberar(id){
  const p=PROFS.find(x=>x.id===id); if(!p)return;
  $('#modalRoot').innerHTML=`<div class="mbg" onclick="if(event.target===this)fecharModal()"><div class="modal">
    <h3>Liberar acesso — ${esc(p.nome||'')}</h3>
    <div class="field"><label>Plano assinado</label><select id="m-plano">
      ${PLANOS.map(pl=>`<option value="${pl.k}" ${p.plano===pl.k?'selected':''}>${esc(pl.nome)} — ${esc(pl.preco)}</option>`).join('')}
    </select></div>
    <div class="field"><label>Período / validade</label><select id="m-meses">
      <option value="1">Mensal (1 mês)</option>
      <option value="3">Trimestral (3 meses)</option>
      <option value="6">Semestral (6 meses)</option>
      <option value="12">Anual (12 meses)</option>
      <option value="0">Sem validade (vitalício)</option>
    </select></div>
    <div class="field"><label>Anotação (opcional)</label><input id="m-obs" placeholder="ex: pagou Pix 24/07" value="${esc(p.obs_admin||'')}"></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn ghost" style="flex:1" onclick="fecharModal()">Cancelar</button>
      <button class="btn" style="flex:1" onclick="confirmarLiberar('${id}')">Liberar</button>
    </div>
  </div></div>`;
}
function fecharModal(){ $('#modalRoot').innerHTML=''; }
let _libPlano=null;
async function confirmarLiberar(id){
  const meses=parseInt($('#m-meses').value,10)||0;
  const obs=$('#m-obs').value.trim()||null;
  _libPlano=$('#m-plano').value||null;
  fecharModal();
  await acao(id,'liberar',meses,obs);
  _libPlano=null;
}
async function verComprovante(id){
  try{
    const {data,error}=await SB.rpc('admin_comprovante',{p_id:id});
    if(error) throw error;
    if(!data){ toast('Sem comprovante enviado.',1); return; }
    const w=window.open('','_blank');
    if(w) w.document.write('<title>Comprovante</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+data+'" style="max-width:100%;max-height:100vh"></body>');
  }catch(e){ toast('Erro: '+(e.message||''),1); }
}
async function acao(id,tipo,meses,obs){
  const labels={aprovar:'Aprovar perfil deste profissional?',rejeitar:'Rejeitar este profissional? Ele perde o acesso.',bloquear:'Bloquear o acesso deste profissional?'};
  if(labels[tipo] && !confirm(labels[tipo])) return;
  try{
    const {error}=await SB.rpc('admin_prof_acao',{p_id:id,p_acao:tipo,p_meses:meses??null,p_obs:obs??null,p_plano:_libPlano??null});
    if(error) throw error;
    const msgs={aprovar:'Perfil aprovado',rejeitar:'Profissional rejeitado',liberar:'Acesso liberado!',bloquear:'Acesso bloqueado'};
    toast(msgs[tipo]||'Feito');
    carregar();
  }catch(e){ toast('Erro: '+(e.message||''),1); }
}

$('#g-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
$('#mfa-code').addEventListener('keydown',e=>{ if(e.key==='Enter') verificarMfa(); });
boot();
</script>
